<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partenariat Régional VENDOB</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.emailjs.com/sdk/3.11.0/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --orange: #F4521E; --dark: #1a1a1a; --light: #f5f5f5; --border: #e0e0e0; }
body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; }
.container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
header { background: white; border-bottom: 2px solid var(--orange); padding: 20px 0; margin-bottom: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.header-content { max-width: 900px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; color: var(--orange); }
.status { padding: 8px 16px; background: #e8f4f0; border-radius: 20px; font-size: 12px; font-weight: 600; color: #00897b; }
.tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--border); }
.tab { padding: 12px 20px; background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; color: #666; border-bottom: 3px solid transparent; }
.tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.content { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.section { display: none; }
.section.active { display: block; }
.form-group { margin-bottom: 25px; }
label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark); font-size: 14px; }
input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(244, 82, 30, 0.1); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
.contract { background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 30px; margin-bottom: 30px; font-size: 13px; line-height: 1.8; }
.contract h2 { color: var(--orange); text-align: center; margin-bottom: 20px; }
.signature-canvas { 
  border: 3px dashed var(--orange); 
  border-radius: 12px; 
  background: #fff; 
  width: 100%; 
  height: 220px; 
  touch-action: none;           /* Très important pour mobile */
  cursor: crosshair;
}
.clear-btn { 
  padding: 12px 20px; background: #f5f5f5; border: 1px solid var(--border); 
  border-radius: 8px; cursor: pointer; margin-top: 12px; font-weight: 600;
}
.button-group { display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px; }
button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
.btn-primary { background: var(--orange); color: white; }
.btn-primary:hover { background: #e03a0c; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: white; color: var(--orange); border: 2px solid var(--orange); }
.success-message { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: none; }
.success-message.show { display: block; }
.info-box { background: #e3f2fd; border-left: 4px solid #2196f3; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
.progress { height: 4px; background: var(--border); margin-bottom: 30px; border-radius: 2px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--orange); width: 33%; transition: width 0.3s; }
.loading { display: none; text-align: center; color: var(--orange); font-weight: 600; margin: 15px 0; }
.loading.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo">🚀 VENDOB</div>
    <div class="status">🟢 Partenariat Régional</div>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('profil')">1. Profil</button>
    <button class="tab" onclick="showTab('contrat')">2. Contrat</button>
    <button class="tab" onclick="showTab('signature')">3. Signature</button>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

  <div class="content">

    <!-- TAB 3: SIGNATURE (la plus importante pour le test) -->
    <div class="section active" id="signature-section">   <!-- Je l'ai mise active pour tester plus facilement -->
      <div class="info-box">
        <strong>✍️ Signature Manuscrite du Partenaire</strong>
        <p>Signez avec votre doigt directement sur l'écran :</p>
      </div>

      <canvas id="signaturePad" class="signature-canvas"></canvas>
      <button type="button" class="clear-btn" onclick="clearSignature()">🗑️ Effacer la signature</button>

      <div style="margin-top:25px;">
        <label style="display:flex; align-items:center; gap:10px; font-size:15px;">
          <input type="checkbox" id="accepteConditions" required> 
          J'accepte les termes du contrat et je signe
        </label>
      </div>

      <div class="loading" id="loading">⏳ Génération du PDF avec votre signature...</div>

      <div class="button-group">
        <button type="button" class="btn-secondary" onclick="showTab('contrat')">← Retour</button>
        <button type="button" class="btn-primary" id="submitBtn" onclick="submitForm()">✅ Signer & Envoyer</button>
      </div>
    </div>

  </div>
</div>

<script>
// Initialisation EmailJS
emailjs.init("rGXngAsslApFe-7us");

let canvas, ctx;

// Initialisation sécurisée du canvas
function initSignaturePad() {
  canvas = document.getElementById('signaturePad');
  if (!canvas) return console.error("Canvas non trouvé");

  ctx = canvas.getContext('2d', { alpha: true });

  // Ajustement haute résolution (important sur mobile)
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * 2;   // 2x pour meilleure qualité
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);                 // Scale le contexte
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let isDrawing = false;
  let lastX = 0, lastY = 0;

  // === MOUSE ===
  canvas.addEventListener('mousedown', (e) => {
    isDrawing = true;
    const rect = canvas.getBoundingClientRect();
    lastX = (e.clientX - rect.left);
    lastY = (e.clientY - rect.top);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left);
    const y = (e.clientY - rect.top);

    ctx.strokeStyle = '#F4521E';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();

    lastX = x;
    lastY = y;
  });

  canvas.addEventListener('mouseup', () => isDrawing = false);
  canvas.addEventListener('mouseout', () => isDrawing = false);

  // === TOUCH (Mobile) - Version renforcée ===
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();           // Très important
    isDrawing = true;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    lastX = (touch.clientX - rect.left);
    lastY = (touch.clientY - rect.top);
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();           // Très important
    if (!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const x = (touch.clientX - rect.left);
    const y = (touch.clientY - rect.top);

    ctx.strokeStyle = '#F4521E';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();

    lastX = x;
    lastY = y;
  }, { passive: false });

  canvas.addEventListener('touchend', () => isDrawing = false);
}

function clearSignature() {
  if (ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Fonctions de navigation (simplifiées)
function showTab(tabName) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tabName + '-section').classList.add('active');
}

function submitForm() {
  const checkbox = document.getElementById('accepteConditions');
  if (!checkbox.checked) return alert("❌ Veuillez accepter les conditions");

  const loading = document.getElementById('loading');
  const submitBtn = document.getElementById('submitBtn');

  loading.classList.add('show');
  submitBtn.disabled = true;

  try {
    const signatureDataURL = canvas ? canvas.toDataURL('image/png') : null;
    alert("Signature capturée ! (Test)\n\nSi tu vois ce message, la signature fonctionne.\nOn va maintenant améliorer le PDF.");
    // Ici tu pourras remettre l'envoi EmailJS plus tard
  } catch (e) {
    alert("Erreur : " + e.message);
  } finally {
    loading.classList.remove('show');
    submitBtn.disabled = false;
  }
}

// Lancement
document.addEventListener('DOMContentLoaded', () => {
  initSignaturePad();
});
</script>
</body>
</html>
