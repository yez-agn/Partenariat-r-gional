<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partenariat VENDOB</title>
<script src="https://cdn.emailjs.com/sdk/3.11.0/email.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
h1 { color: #F4521E; margin-bottom: 10px; }
p { color: #666; margin-bottom: 20px; }
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: Arial; font-size: 14px; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #F4521E; box-shadow: 0 0 5px rgba(244, 82, 30, 0.3); }
textarea { resize: vertical; min-height: 80px; }
button { width: 100%; padding: 12px; background: #F4521E; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
button:hover { background: #d93f15; }
button:disabled { background: #ccc; cursor: not-allowed; }
.alert { padding: 15px; border-radius: 4px; margin: 15px 0; display: none; }
.alert.show { display: block; }
.success { background: #d4edda; border-left: 4px solid #28a745; color: #155724; }
.error { background: #f8d7da; border-left: 4px solid #dc3545; color: #721c24; }
.loading { display: none; text-align: center; color: #F4521E; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #F4521E; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <h1>🚀 VENDOB - Partenariat Régional</h1>
  <p>Remplissez le formulaire et envoyez votre demande</p>

  <div id="alert" class="alert"></div>
  <div id="loading" class="loading"><div class="spinner"></div> Envoi...</div>

  <form id="myForm">
    
    <div class="form-group">
      <label>Nom *</label>
      <input type="text" name="nom" required>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" name="email" required>
    </div>

    <div class="form-group">
      <label>Téléphone *</label>
      <input type="tel" name="telephone" required>
    </div>

    <div class="form-group">
      <label>WhatsApp</label>
      <input type="tel" name="whatsapp">
    </div>

    <div class="form-group">
      <label>Pays *</label>
      <select name="pays" required>
        <option value="">-- Sélectionner --</option>
        <option value="Côte d'Ivoire">Côte d'Ivoire</option>
        <option value="Nigeria">Nigeria</option>
        <option value="Togo">Togo</option>
        <option value="Bénin">Bénin</option>
      </select>
    </div>

    <div class="form-group">
      <label>Ville *</label>
      <input type="text" name="ville" required>
    </div>

    <div class="form-group">
      <label>Zone *</label>
      <input type="text" name="zone" required>
    </div>

    <div class="form-group">
      <label>Expérience *</label>
      <textarea name="experience" required></textarea>
    </div>

    <div class="form-group">
      <label>Fournisseurs connus *</label>
      <input type="number" name="fournisseurs" required>
    </div>

    <div class="form-group">
      <label>Équipe *</label>
      <select name="equipe" required>
        <option value="">-- Sélectionner --</option>
        <option value="1-2">1-2</option>
        <option value="3-5">3-5</option>
        <option value="6-10">6-10</option>
        <option value="10+">10+</option>
      </select>
    </div>

    <div class="form-group">
      <label>Logistique *</label>
      <textarea name="logistique" required></textarea>
    </div>

    <div class="form-group">
      <label>Délai (jours) *</label>
      <input type="number" name="delai" required>
    </div>

    <div class="form-group">
      <label>Zones *</label>
      <textarea name="zones" required></textarea>
    </div>

    <button type="submit" id="btn">📧 Envoyer</button>

  </form>
</div>

<script>
emailjs.init("rGXngAsslApFe-7us");

const form = document.getElementById('myForm');
const btn = document.getElementById('btn');
const alert = document.getElementById('alert');
const loading = document.getElementById('loading');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const fd = new FormData(form);
  
  const data = {
    to_email: 'yezidagnide@gmail.com',
    nom: fd.get('nom'),
    email: fd.get('email'),
    telephone: fd.get('telephone'),
    whatsapp: fd.get('whatsapp') || '-',
    pays: fd.get('pays'),
    ville: fd.get('ville'),
    zone: fd.get('zone'),
    experience: fd.get('experience'),
    fournisseurs: fd.get('fournisseurs'),
    equipe: fd.get('equipe'),
    logistique: fd.get('logistique'),
    delai: fd.get('delai'),
    zones: fd.get('zones'),
    date_signature: new Date().toLocaleDateString('fr-FR')
  };

  btn.disabled = true;
  loading.style.display = 'block';

  try {
    await emailjs.send('service_geizbmp', 'template_6fx9wss', data);
    
    alert.className = 'alert show success';
    alert.innerHTML = '✅ Formulaire envoyé avec succès !';
    
    form.reset();
    
  } catch (error) {
    alert.className = 'alert show error';
    alert.innerHTML = '❌ Erreur: ' + error.message;
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
});
</script>

</body>
</html>
